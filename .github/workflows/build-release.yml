name: Build release (Windows, Linux, Android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: stable

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Release metadata
        id: release
        shell: bash
        run: bash .github/scripts/release-vars.sh

      - name: Cache Pub
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - name: Build Windows release
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: flutter build windows --release

      - name: Package Windows portable
        shell: pwsh
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHORT_SHA: ${{ steps.release.outputs.short_sha }}
        run: |
          $baseName = "c_editor-$env:VERSION+$env:SHORT_SHA-windows-portable"
          $bundleDir = "dist/portable/c_editor"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          Copy-Item -Path "build/windows/x64/runner/Release/*" -Destination $bundleDir -Recurse -Force
          $zipPath = "dist/$baseName.zip"
          Compress-Archive -Path $bundleDir -DestinationPath $zipPath -Force
          echo "ARTIFACT_PATH=$zipPath" >> $env:GITHUB_ENV
          echo "ARTIFACT_NAME=$baseName" >> $env:GITHUB_ENV

      - name: Prepare Windows installer
        id: installer
        shell: pwsh
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHORT_SHA: ${{ steps.release.outputs.short_sha }}
        run: |
          $baseName = "c_editor-$env:VERSION+$env:SHORT_SHA-windows-installer"
          $releasePath = ((Resolve-Path "build/windows/x64/runner/Release").Path) -replace '\\', '/'
          $outputDir = ((Resolve-Path ".").Path + "/dist/installer") -replace '\\', '/'
          New-Item -ItemType Directory -Path "dist/installer" -Force | Out-Null

          Copy-Item LICENSE dist/installer/license.txt
          $licenseFilePath = ((Resolve-Path "dist/installer/license.txt").Path) -replace '\\', '/'

          Add-Type -AssemblyName System.Drawing
          $iconPng = (Resolve-Path "assets/meta/icon.png").Path
          $iconIco = Join-Path (Resolve-Path "dist/installer").Path "setup_icon.ico"
          $bitmap = [System.Drawing.Bitmap]::new($iconPng)
          $icon = [System.Drawing.Icon]::FromHandle($bitmap.GetHicon())
          $fileStream = [System.IO.File]::Create($iconIco)
          $icon.Save($fileStream)
          $fileStream.Close()
          $icon.Dispose()
          $bitmap.Dispose()
          $setupIconPath = ($iconIco -replace '\\', '/')

          echo "name=$baseName" >> $env:GITHUB_OUTPUT
          echo "path=dist/installer/$baseName.exe" >> $env:GITHUB_OUTPUT
          @(
            "options<<EOF"
            "/DMyAppVersion=$env:VERSION"
            "/DSourcePath=$releasePath"
            "/DOutputBaseFilename=$baseName"
            "/DOutputDir=$outputDir"
            "/DLicenseFilePath=$licenseFilePath"
            "/DSetupIconPath=$setupIconPath"
            "EOF"
          ) | ForEach-Object { echo $_ >> $env:GITHUB_OUTPUT }

      - name: Build Windows installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: windows/installer/c_editor.iss
          options: ${{ steps.installer.outputs.options }}

      - name: Verify Windows installer
        shell: pwsh
        run: |
          $installerPath = "${{ steps.installer.outputs.path }}"
          if (-not (Test-Path $installerPath)) {
            Write-Error "Installer not found at $installerPath"
            if (Test-Path dist/installer) {
              Write-Host "Contents of dist/installer:"
              Get-ChildItem dist/installer | Format-Table -AutoSize
            }
            exit 1
          }

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.installer.outputs.name }}
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Release metadata
        id: release
        run: bash .github/scripts/release-vars.sh

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-14-dev zip
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 \
            /usr/lib/x86_64-linux-gnu/libstdc++.so

      - name: Cache Pub
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package Linux portable
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHORT_SHA: ${{ steps.release.outputs.short_sha }}
        run: |
          BASE_NAME="c_editor-${VERSION}+${SHORT_SHA}-linux-portable"
          mkdir -p "dist/portable/c_editor"
          cp -a build/linux/x64/release/bundle/. "dist/portable/c_editor/"
          (cd dist/portable && zip -r "../${BASE_NAME}.zip" c_editor)
          echo "ARTIFACT_PATH=dist/${BASE_NAME}.zip" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${BASE_NAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  build-android:
    name: Android APK (signed)
    runs-on: ubuntu-latest
    # Release keystore secrets are not available to workflows triggered from fork PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7

      - name: Release metadata
        id: release
        run: bash .github/scripts/release-vars.sh

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Pub
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Decode release keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          if [ -z "$KEYSTORE" ]; then
            echo "Missing repository secret KEYSTORE (base64-encoded keystore)."
            exit 1
          fi
          echo "$KEYSTORE" | base64 -d > android/app/release-keystore.jks

      - run: flutter pub get

      - name: Build signed release APK
        env:
          # Path is relative to the android/ Gradle root (rootProject.file), not the repo root.
          ANDROID_KEYSTORE_FILE: app/release-keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
        run: flutter build apk --release

      - name: Stage APK artifact
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHORT_SHA: ${{ steps.release.outputs.short_sha }}
        run: |
          BASE_NAME="c_editor-${VERSION}+${SHORT_SHA}-android-apk"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${BASE_NAME}.apk"
          echo "ARTIFACT_PATH=dist/${BASE_NAME}.apk" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${BASE_NAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
